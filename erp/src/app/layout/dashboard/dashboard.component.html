<div class="space-y-8 p-6">

  <!-- Financial Overview -->
  <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
    <i class="fas fa-chart-pie text-indigo-600"></i> Financial Overview
  </h2>

  <div *ngIf="dashboard; else loading">

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
      <ng-container *ngFor="let card of [
        { ...dashboard.totalRevenue, icon: 'fas fa-dollar-sign', accent: 'text-green-600' },
        { ...dashboard.accountsReceivable, icon: 'fas fa-file-invoice', accent: 'text-yellow-500' },
        { ...dashboard.accountsPayable, icon: 'fas fa-file-invoice-dollar', accent: 'text-red-600' },
        { ...dashboard.cashBalance, icon: 'fas fa-university', accent: 'text-indigo-600' }
      ]">
        <div *ngIf="card" class="bg-white shadow-lg rounded-2xl p-6 hover:shadow-xl transition transform hover:-translate-y-1">
          
          <!-- Header with Icon -->
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-gray-500 text-sm flex items-center gap-2">
              <i [class]="card.icon + ' ' + card.accent"></i> {{ card.title }}
            </h3>
            <i class="fas fa-chart-line text-gray-400"></i>
          </div>

          <!-- Value -->
          <p class="text-2xl font-bold"
             [ngClass]="{'text-green-600': card.trend==='up','text-red-600': card.trend==='down'}">
            {{ card.value | number:'1.0-2' }}
          </p>

          <!-- Trend -->
          <span class="text-sm text-gray-400 flex items-center gap-1">
            <i [class]="card.trend==='up' ? 'fas fa-arrow-up text-green-500' : 'fas fa-arrow-down text-red-500'"></i>
            {{ card.trendValue }}
          </span>
        </div>
      </ng-container>
    </div>

    <!-- Pending Actions Table -->
    <div class="bg-white rounded-2xl shadow-md p-6 mt-8">
      <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <h2 class="text-xl font-semibold text-gray-800 flex items-center gap-2">
          <i class="fas fa-tasks text-indigo-600"></i> Pending Actions
        </h2>
        <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded-lg transition">
          <i class="fas fa-check-circle mr-2"></i> Mark All Complete
        </button>
      </div>

      <div class="overflow-x-auto mt-4">
        <table class="min-w-full border border-gray-200 divide-y divide-gray-200 rounded-lg overflow-hidden">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Action</th>
              <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Module</th>
              <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Priority</th>
              <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Due Date</th>
              <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Status</th>
              <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Actions</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let pa of dashboard.pendingActions" class="hover:bg-gray-50 transition">
              <td class="px-4 py-3 text-gray-700">{{ pa.action }}</td>
              <td class="px-4 py-3 text-gray-700">{{ pa.module }}</td>
              <td class="px-4 py-3 text-gray-700">{{ pa.priority }}</td>
              <td class="px-4 py-3 text-gray-700">{{ pa.dueDate }}</td>
              <td class="px-4 py-3">
                <span [ngClass]="{
                  'bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-medium': pa.status==='Completed',
                  'bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full text-xs font-medium': pa.status==='Pending',
                  'bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs font-medium': pa.status==='Overdue'
                }">
                  {{ pa.status }}
                </span>
              </td>
              <td class="px-4 py-3">
                <button (click)="pa.status='Completed'" class="text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1">
                  <i class="fas fa-check"></i> Complete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Loading State -->
  <ng-template #loading>
    <div class="text-center text-gray-500 mt-10 flex items-center justify-center gap-2">
      <i class="fas fa-spinner fa-spin"></i> Loading dashboard data...
    </div>
  </ng-template>

</div>
