<div class="p-6 bg-gray-50 min-h-screen">

  <!-- Page Title -->
  <h2 class="text-2xl sm:text-3xl font-bold mb-4 flex items-center gap-2 text-gray-800">
    <i class="fas fa-columns text-blue-600"></i> Domain Comparison
  </h2>

  <!-- Domain buttons -->
  <div class="flex flex-wrap gap-2 mb-6">
    <button *ngFor="let d of domains"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow hover:bg-blue-700 transition duration-200"
            (click)="showDomainDetails(d.name)">
      {{ d.title }}
    </button>
  </div>

  <!-- Domain cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div *ngFor="let d of domains"
         class="border border-gray-200 p-5 rounded-xl shadow hover:shadow-lg transition duration-300 bg-white">
      <h3 class="text-lg sm:text-xl font-semibold flex items-center gap-2 mb-2 text-gray-700">
        <i [class]="
            d.name === 'hotel' ? 'fas fa-hotel text-red-500' :
            d.name === 'education' ? 'fas fa-graduation-cap text-green-500' :
            d.name === 'banking' ? 'fas fa-university text-yellow-600' :
            'fas fa-industry text-gray-600'"></i>
        {{ d.title }}
      </h3>
      <p class="mb-1 text-sm sm:text-base"><strong>Revenue Recognition:</strong> {{ d.revenue }}</p>
      <p class="mb-1 text-sm sm:text-base"><strong>Key Accounts:</strong> {{ d.keyAccounts }}</p>
      <p class="mb-3 text-sm sm:text-base"><strong>AP Focus:</strong> {{ d.apFocus }}</p>
      <button class="mt-2 px-4 py-2 border border-gray-300 rounded hover:bg-gray-100 transition duration-200 text-sm sm:text-base"
              (click)="applyDomainSettings(d.name)">
        {{ d.applies ? 'Applied' : 'Apply Settings' }}
      </button>
    </div>
  </div>

  <!-- Selected domain details -->
  <div *ngIf="selectedDomain" 
       class="mt-6 p-4 sm:p-6 border border-gray-200 rounded-2xl bg-white shadow transition duration-300">
    <h3 class="text-xl sm:text-2xl font-bold mb-2 sm:mb-4 text-gray-800">{{ selectedDomain.title }}</h3>
    <p class="mb-1 sm:mb-2 text-sm sm:text-base"><strong>Revenue Recognition:</strong> {{ selectedDomain.revenue }}</p>
    <p class="mb-1 sm:mb-2 text-sm sm:text-base"><strong>Key Accounts:</strong> {{ selectedDomain.keyAccounts }}</p>
    <p class="text-sm sm:text-base"><strong>AP Focus:</strong> {{ selectedDomain.apFocus }}</p>
  </div>

</div>
